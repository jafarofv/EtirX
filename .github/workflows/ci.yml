name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (check · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Real secret so the production guard (DEBUG=False + insecure key) passes.
      # REDIS_URL is intentionally unset -> settings falls back to LocMemCache.
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test shop.tests -v2
